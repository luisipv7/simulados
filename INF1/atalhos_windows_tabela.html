
<style>
  body { margin: 0; padding: 0; }
  .container { padding: 16px 0; font-size: 14px; color: var(--color-text-primary); }
  .search-bar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
  .search-bar input {
    flex: 1; padding: 8px 12px; border-radius: var(--border-radius-md);
    border: 1px solid var(--color-border-secondary); background: var(--color-background-secondary);
    color: var(--color-text-primary); font-size: 14px; outline: none;
  }
  .search-bar input:focus { border-color: var(--color-border-primary); }
  .tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .tab {
    padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--color-border-secondary); cursor: pointer;
    background: var(--color-background-secondary); color: var(--color-text-secondary);
    transition: background .15s, color .15s;
  }
  .tab.active, .tab:hover { background: var(--color-background-primary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--color-border-tertiary); }
  tbody tr { border-bottom: 1px solid var(--color-border-tertiary); }
  tbody tr:hover { background: var(--color-background-secondary); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 8px 10px; vertical-align: middle; font-size: 13px; line-height: 1.5; }
  td:first-child { width: 36%; }
  .kbd { display: inline-flex; align-items: center; gap: 2px; flex-wrap: wrap; }
  .k {
    display: inline-block; padding: 2px 7px; font-family: var(--font-mono);
    font-size: 11px; font-weight: 500; border-radius: 4px;
    background: var(--color-background-tertiary); border: 1px solid var(--color-border-secondary);
    color: var(--color-text-primary); white-space: nowrap; line-height: 1.6;
  }
  .plus { font-size: 11px; color: var(--color-text-tertiary); padding: 0 1px; }
  .cat-badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
  .empty { text-align: center; color: var(--color-text-tertiary); padding: 32px 0; font-size: 13px; }
  .count { font-size: 12px; color: var(--color-text-tertiary); margin-left: auto; align-self: center; }
</style>
<div class="container">
  <div class="search-bar">
    <input type="text" id="q" placeholder="Buscar atalho ou função..." oninput="render()">
    <span class="count" id="cnt"></span>
  </div>
  <div class="tabs" id="tabs"></div>
  <table>
    <thead><tr><th>Atalho</th><th>Função</th><th>Categoria</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

  { k: ["Win","R"], desc: "Executar → 'snippingtool' para Ferramenta de Recorte", cat: "Ferramentas nativas" },

  { k: ["Win","R"], desc: "Executar → 'regedit' para Editor do Registro", cat: "Ferramentas nativas" },
  { k: ["Win","R"], desc: "Executar → 'gpedit.msc' para Editor de Política de Grupo", cat: "Ferramentas nativas" },
  { k: ["Win","R"], desc: "Executar → 'diskmgmt.msc' para Gerenciamento de Disco", cat: "Ferramentas nativas" },

  { k: ["Win","R"], desc: "Executar → 'resmon' para Monitor de Recursos", cat: "Ferramentas nativas" },

let activeCat = "Todos";

function badge(cat) {
  const dark = matchMedia('(prefers-color-scheme: dark)').matches;
  const c = cats[cat];
  const bg = dark ? c.dbbg : c.bg;
  const col = dark ? c.bg : c.color;
  return `<span class="cat-badge" style="background:${bg};color:${col}">${cat}</span>`;
}

function kbd(keys) {
  return `<span class="kbd">${keys.map((k,i) => `${i>0?'<span class="plus">+</span>':''}<span class="k">${k}</span>`).join('')}</span>`;
}

function render() {
  const q = document.getElementById('q').value.toLowerCase();
  const rows = data.filter(r =>
    (activeCat === "Todos" || r.cat === activeCat) &&
    (r.desc.toLowerCase().includes(q) || r.k.join('').toLowerCase().includes(q) || r.cat.toLowerCase().includes(q))
  );
  const tbody = document.getElementById('tbody');
  document.getElementById('cnt').textContent = rows.length + ' atalho' + (rows.length !== 1 ? 's' : '');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="3" class="empty">Nenhum atalho encontrado.</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r =>
    `<tr><td>${kbd(r.k)}</td><td style="color:var(--color-text-secondary)">${r.desc}</td><td>${badge(r.cat)}</td></tr>`
  ).join('');
}

function buildTabs() {
  const all = ["Todos", ...Object.keys(cats)];
  document.getElementById('tabs').innerHTML = all.map(c =>
    `<button class="tab${c===activeCat?' active':''}" onclick="setTab('${c}')">${c}</button>`
  ).join('');
}

function setTab(cat) {
  activeCat = cat;
  buildTabs();
  render();
}

buildTabs();
render();
</script>
