<style>
  :root {
    --panel-border: color-mix(in srgb, var(--color-border-secondary) 78%, transparent);
    --panel-bg: color-mix(in srgb, var(--color-background-primary) 92%, var(--color-background-secondary));
    --panel-muted: color-mix(in srgb, var(--color-background-secondary) 78%, transparent);
    --row-hover: color-mix(in srgb, var(--color-background-secondary) 82%, var(--color-background-primary));
    --row-alt: color-mix(in srgb, var(--color-background-secondary) 42%, transparent);
    --shadow-soft: 0 10px 28px rgba(15, 23, 42, 0.08);
  }

  body {
    margin: 0;
    padding: 0;
  }

  .container {
    padding: 20px 0;
    font-size: 14px;
    color: var(--color-text-primary);
  }

  .panel {
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    background: linear-gradient(180deg, var(--panel-bg), var(--color-background-primary));
    box-shadow: var(--shadow-soft);
    overflow: hidden;
  }

  .panel-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 18px 12px;
  }

  .title-wrap h2 {
    margin: 0;
    font-size: 18px;
    line-height: 1.2;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .title-wrap p {
    margin: 6px 0 0;
    color: var(--color-text-secondary);
    font-size: 13px;
    line-height: 1.45;
  }

  .count {
    white-space: nowrap;
    border: 1px solid var(--color-border-secondary);
    background: var(--panel-muted);
    color: var(--color-text-secondary);
    padding: 7px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }

  .controls {
    padding: 0 18px 14px;
  }

  .search-bar {
    position: relative;
    display: flex;
    align-items: center;
    margin-bottom: 14px;
  }

  .search-bar input {
    width: 100%;
    padding: 11px 14px 11px 40px;
    border-radius: 12px;
    border: 1px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    font-size: 14px;
    outline: none;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }

  .search-bar input:focus {
    border-color: var(--color-border-primary);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--color-border-primary) 18%, transparent);
    background: var(--color-background-primary);
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--color-text-tertiary);
    font-size: 14px;
    pointer-events: none;
  }

  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tab {
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--color-border-secondary);
    cursor: pointer;
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
    transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }

  .tab:hover {
    transform: translateY(-1px);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    border-color: var(--color-border-primary);
  }

  .tab.active {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: var(--color-text-primary);
  }

  .table-wrap {
    padding: 0 8px 8px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    min-width: 760px;
  }

  thead th {
    position: sticky;
    top: 0;
    z-index: 1;
    text-align: left;
    padding: 12px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    background: color-mix(in srgb, var(--color-background-primary) 88%, var(--color-background-secondary));
    border-bottom: 1px solid var(--color-border-secondary);
  }

  thead th:first-child {
    border-top-left-radius: 12px;
  }

  thead th:last-child {
    border-top-right-radius: 12px;
  }

  tbody tr {
    transition: background 0.16s ease, transform 0.16s ease;
  }

  tbody tr:nth-child(even) {
    background: var(--row-alt);
  }

  tbody tr:hover {
    background: var(--row-hover);
  }

  td {
    padding: 14px;
    vertical-align: middle;
    font-size: 13px;
    line-height: 1.5;
    border-bottom: 1px solid var(--color-border-tertiary);
  }

  tbody tr:last-child td {
    border-bottom: none;
  }

  td:first-child {
    width: 33%;
  }

  td:nth-child(2) {
    width: 43%;
    color: var(--color-text-secondary);
  }

  .kbd {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }

  .k {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 28px;
    padding: 0 9px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    border-radius: 8px;
    background: linear-gradient(180deg, var(--color-background-primary), var(--color-background-tertiary));
    border: 1px solid var(--color-border-secondary);
    color: var(--color-text-primary);
    white-space: nowrap;
    box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.06);
  }

  .plus {
    font-size: 11px;
    color: var(--color-text-tertiary);
  }

  .cat-badge {
    display: inline-flex;
    align-items: center;
    min-height: 26px;
    padding: 0 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .empty {
    text-align: center;
    color: var(--color-text-tertiary);
    padding: 42px 16px;
    font-size: 13px;
  }

  @media (max-width: 820px) {
    .panel-head {
      flex-direction: column;
      align-items: stretch;
    }

    .count {
      align-self: flex-start;
    }

    .table-wrap {
      padding: 0;
    }

    table {
      min-width: 0;
    }

    thead {
      display: none;
    }

    tbody,
    tr,
    td {
      display: block;
      width: 100%;
    }

    tbody {
      padding: 0 10px 10px;
    }

    tbody tr {
      margin: 0 0 10px;
      border: 1px solid var(--color-border-secondary);
      border-radius: 14px;
      overflow: hidden;
      background: var(--color-background-primary);
    }

    tbody tr:nth-child(even) {
      background: var(--color-background-primary);
    }

    td {
      border-bottom: 1px solid var(--color-border-tertiary);
      padding: 12px 14px;
    }

    td:last-child {
      border-bottom: none;
    }

    td::before {
      content: attr(data-label);
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
    }
  }
</style>

<div class="container">
  <div class="panel">
    <div class="panel-head">
      <div class="title-wrap">
        <h2>Atalhos do Windows</h2>
        <p>Consulte, filtre e encontre rapidamente combinações úteis para navegação, produtividade e administração.</p>
      </div>
      <span class="count" id="cnt"></span>
    </div>

    <div class="controls">
      <div class="search-bar">
        <span class="search-icon">⌕</span>
        <input type="text" id="q" placeholder="Buscar atalho, função ou categoria..." oninput="render()">
      </div>
      <div class="tabs" id="tabs"></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Atalho</th>
            <th>Função</th>
            <th>Categoria</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

  { k: ["Win", "Ctrl", "Shift", "B"], desc: "Reiniciar o driver de vídeo", cat: "Virtualização/Snap" },

  { k: ["Win", "-"], desc: "Diminuir o zoom da Lupa", cat: "Acessibilidade" },

  { k: ["Win", "R"], desc: "Executar `mspaint` para abrir o Paint", cat: "Ferramentas nativas" },
  { k: ["Win", "R"], desc: "Executar `notepad` para abrir o Bloco de Notas", cat: "Ferramentas nativas" },
  { k: ["Win", "R"], desc: "Executar `calc` para abrir a Calculadora", cat: "Ferramentas nativas" },
  { k: ["Win", "R"], desc: "Executar `mstsc` para abrir a Área de Trabalho Remota", cat: "Ferramentas nativas" },

  { k: ["Win", "R"], desc: "Executar `regedit` para abrir o Editor do Registro", cat: "Ferramentas nativas" },
  { k: ["Win", "R"], desc: "Executar `gpedit.msc` para abrir o Editor de Política de Grupo", cat: "Ferramentas nativas" },
  { k: ["Win", "R"], desc: "Executar `diskmgmt.msc` para abrir o Gerenciamento de Disco", cat: "Ferramentas nativas" },
  { k: ["Win", "R"], desc: "Executar `services.msc` para abrir os Serviços do Windows", cat: "Ferramentas nativas" },
  { k: ["Win", "R"], desc: "Executar `eventvwr` para abrir o Visualizador de Eventos", cat: "Ferramentas nativas" },

  { k: ["Win", "R"], desc: "Executar `control` para abrir o Painel de Controle", cat: "Ferramentas nativas" },
  { k: ["Win", "R"], desc: "Executar `perfmon` para abrir o Monitor de Desempenho", cat: "Ferramentas nativas" },
  { k: ["Win", "R"], desc: "Executar `resmon` para abrir o Monitor de Recursos", cat: "Ferramentas nativas" },
];

let activeCat = "Todos";

function normalize(text) {
  return text
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function badge(cat) {
  const dark = matchMedia("(prefers-color-scheme: dark)").matches;
  const c = cats[cat];
  const bg = dark ? c.dbbg : c.bg;
  const col = dark ? c.dbg : c.color;
  return `<span class="cat-badge" style="background:${bg};color:${col}">${cat}</span>`;
}

function kbd(keys) {
  return `<span class="kbd">${keys.map((key, index) => `${index > 0 ? '<span class="plus">+</span>' : ""}<span class="k">${key}</span>`).join("")}</span>`;
}

function render() {
  const q = normalize(document.getElementById("q").value);
  const rows = data.filter((row) =>
    (activeCat === "Todos" || row.cat === activeCat) &&
    (
      normalize(row.desc).includes(q) ||
      normalize(row.k.join(" ")).includes(q) ||
      normalize(row.cat).includes(q)
    )
  );

  document.getElementById("cnt").textContent = `${rows.length} atalho${rows.length !== 1 ? "s" : ""}`;

  const tbody = document.getElementById("tbody");
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="3" class="empty">Nenhum atalho encontrado para esse filtro.</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map((row) => `
    <tr>
      <td data-label="Atalho">${kbd(row.k)}</td>
      <td data-label="Função">${row.desc}</td>
      <td data-label="Categoria">${badge(row.cat)}</td>
    </tr>
  `).join("");
}

function buildTabs() {
  const all = ["Todos", ...Object.keys(cats)];
  document.getElementById("tabs").innerHTML = all.map((cat) =>
    `<button type="button" class="tab${cat === activeCat ? " active" : ""}" onclick="setTab('${cat}')">${cat}</button>`
  ).join("");
}

function setTab(cat) {
  activeCat = cat;
  buildTabs();
  render();
}

buildTabs();
render();
</script>
