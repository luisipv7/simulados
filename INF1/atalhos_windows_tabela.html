  :root {
    color-scheme: light dark;
    --ui-bg: color-mix(
      in srgb,
      var(--color-background-primary, #f5f7fb) 82%,

    );
    --ui-surface: color-mix(
      in srgb,
      var(--color-background-primary, #ffffff) 92%,
      #eef4ff 8%
    );
    --ui-surface-strong: color-mix(
      in srgb,
      var(--color-background-secondary, #eef2f8) 78%,
      #ffffff 22%
    );
    --ui-border: color-mix(
      in srgb,
      var(--color-border-secondary, #d6ddea) 70%,
      transparent 30%
    );
    --ui-border-strong: color-mix(
      in srgb,
      var(--color-border-primary, #9db4da) 74%,
      #4b74c9 26%
    );
    --ui-text: var(--color-text-primary, #122033);
    --ui-text-soft: var(--color-text-secondary, #5c6980);
    --ui-text-muted: var(--color-text-tertiary, #8490a3);
    --ui-accent: #2563eb;
    --ui-accent-soft: rgba(37, 99, 235, 0.14);
    --ui-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
    --ui-radius-xl: 28px;
    --ui-radius-lg: 20px;
  }

  body {
    margin: 0;
    padding: 0;
    background:
      radial-gradient(
        circle at top left,
        rgba(37, 99, 235, 0.14),
        transparent 28%
      ),
      radial-gradient(
        circle at top right,
        rgba(14, 165, 233, 0.12),
        transparent 24%
      ),
      var(--ui-bg);
  }

  .container {
    position: relative;
    overflow: hidden;
    padding: 28px;
    font-size: 14px;
    color: var(--ui-text);
    border: 1px solid var(--ui-border);
    border-radius: var(--ui-radius-xl);
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.78),
      rgba(255, 255, 255, 0.92)
    );
    box-shadow: var(--ui-shadow);
    backdrop-filter: blur(14px);
  }

  .container::before {
    content: '';
    position: absolute;
    inset: 0 auto auto 0;
    width: 180px;
    height: 180px;
    background: radial-gradient(
      circle,
      rgba(59, 130, 246, 0.16),
      transparent 70%
    );
    pointer-events: none;
  }

  .hero {
    position: relative;
    display: grid;
    gap: 8px;
    margin-bottom: 22px;
  }

  .eyebrow {
    display: inline-flex;
    width: fit-content;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 999px;
    background: var(--ui-accent-soft);
    color: var(--ui-accent);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .hero h2 {
    margin: 0;
    font-size: clamp(24px, 3vw, 34px);
    line-height: 1.05;
    letter-spacing: -0.03em;
  }

  .hero p {
    margin: 0;
    max-width: 720px;
    color: var(--ui-text-soft);
    font-size: 14px;
    line-height: 1.7;
  }

  .toolbar {
    position: relative;
    z-index: 1;
    display: grid;
    gap: 14px;
    margin-bottom: 18px;
  }

  .search-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 14px;
    border: 1px solid var(--ui-border);
    border-radius: var(--ui-radius-lg);
    background: color-mix(in srgb, var(--ui-surface) 86%, transparent);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
  }

  .search-input-wrap {
    position: relative;
    flex: 1;
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ui-text-muted);
    font-size: 15px;
    pointer-events: none;
  }

  .search-bar input {
    width: 100%;
    padding: 14px 16px 14px 42px;
    border-radius: 16px;
    border: 1px solid transparent;
    background: var(--ui-surface-strong);
    color: var(--ui-text);
    font-size: 14px;
    outline: none;
    transition:
      border-color 0.18s ease,
      box-shadow 0.18s ease,
      transform 0.18s ease,
      background 0.18s ease;
  }

  .search-bar input::placeholder {
    color: var(--ui-text-muted);
  }

  .search-bar input:focus {
    border-color: var(--ui-border-strong);
    background: var(--color-background-primary, #ffffff);
    box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.12);
    transform: translateY(-1px);
  }

  .count {
    flex-shrink: 0;
    padding: 10px 14px;
    border-radius: 999px;
    background: var(--ui-accent-soft);
    color: var(--ui-accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tab {
    padding: 9px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--ui-border);
    cursor: pointer;
    background: color-mix(in srgb, var(--ui-surface) 88%, transparent);
    color: var(--ui-text-soft);
    transition:
      transform 0.16s ease,
      background 0.16s ease,
      color 0.16s ease,
      border-color 0.16s ease,
      box-shadow 0.16s ease;
  }

  .tab:hover {
    transform: translateY(-1px);
    color: var(--ui-text);
    border-color: var(--ui-border-strong);
  }

  .tab.active {
    color: #ffffff;
    background: linear-gradient(135deg, #2563eb, #0ea5e9);
    border-color: transparent;
    box-shadow: 0 14px 24px rgba(37, 99, 235, 0.24);
  }

  .table-shell {
    border: 1px solid var(--ui-border);
    border-radius: var(--ui-radius-lg);
    overflow: hidden;
    background: color-mix(in srgb, var(--ui-surface) 92%, transparent);
  }

  .table-scroll {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
  }

  thead th {
    position: sticky;
    top: 0;
    z-index: 1;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ui-text-muted);
    text-align: left;
    padding: 16px 18px;
    background: color-mix(in srgb, var(--ui-surface-strong) 80%, white 20%);
    border-bottom: 1px solid var(--ui-border);
  }

  tbody tr {
    transition: background 0.16s ease;
  }

  tbody tr:nth-child(even) td {
    background: rgba(148, 163, 184, 0.04);
  }

  tbody tr:hover td {
    background: rgba(37, 99, 235, 0.06);
  }

  tbody tr + tr td {
    border-top: 1px solid var(--ui-border);
  }

  td {
    padding: 16px 18px;
    vertical-align: middle;
    font-size: 13px;
    line-height: 1.6;
  }

  td:first-child {
    width: 36%;
  }

  .kbd {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }

  .k {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 4px 10px;
    font-family: var(--font-mono, 'Consolas', monospace);
    font-size: 11px;
    font-weight: 700;
    border-radius: 10px;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.94),
      rgba(226, 232, 240, 0.92)
    );
    border: 1px solid rgba(148, 163, 184, 0.36);
    box-shadow: inset 0 -1px 0 rgba(148, 163, 184, 0.24);
    color: var(--ui-text);
    white-space: nowrap;
    line-height: 1.2;
  }

  .plus {
    font-size: 11px;
    font-weight: 700;
    color: var(--ui-text-muted);
    padding: 0 2px;
  }

  .cat-badge {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 700;
    border: 1px solid rgba(255, 255, 255, 0.26);
  }

  .empty {
    text-align: center;
    color: var(--ui-text-muted);
    padding: 42px 18px;
    font-size: 13px;
  }

  .cmd-pair {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .cmd-os {
    display: inline-block;
    margin-right: 8px;
    font-size: 10px;
    color: var(--ui-text-muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .desc {
    color: var(--ui-text-soft);
  }

  @media (max-width: 720px) {
    .container {
      padding: 18px;
      border-radius: 22px;
    }

    .search-bar {
      flex-wrap: wrap;
    }

    .count {
      width: 100%;
      text-align: center;
    }

    thead th,
    td {
      padding: 14px;
    }
  }

      color: #f8fafc;
    }

</style>

  let activeCat = 'Todos';

  function badge(cat) {
    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
    const c = cats[cat];
    const bg = dark ? c.dbbg : c.bg;
    const col = dark ? c.bg : c.color;
    return `<span class="cat-badge" style="background:${bg};color:${col}">${cat}</span>`;
  }

  function kbd(keys, isCmd) {
    if (isCmd) {
      const labels = ['Linux', 'Windows'];
      return `<div class="cmd-pair">${keys
        .map(
          (k, i) =>
            `<div><span class="cmd-os">${labels[i]}</span> <span class="k">${escHtml(k)}</span></div>`,
        )
        .join('')}</div>`;
    }
    return `<span class="kbd">${keys
      .map(
        (k, i) =>
          `${i > 0 ? '<span class="plus">+</span>' : ''}<span class="k">${k}</span>`,
      )
      .join('')}</span>`;
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function render() {
    const q = document.getElementById('q').value.toLowerCase();
    const rows = data.filter(
      (r) =>
        (activeCat === 'Todos' || r.cat === activeCat) &&
        (r.desc.toLowerCase().includes(q) ||
          r.k.join(' ').toLowerCase().includes(q) ||
          r.cat.toLowerCase().includes(q)),
    );
    const tbody = document.getElementById('tbody');
    document.getElementById('cnt').textContent =
      rows.length + ' entr' + (rows.length !== 1 ? 'adas' : 'ada');
    if (!rows.length) {
      tbody.innerHTML =
        '<tr><td colspan="3" class="empty">Nenhum resultado encontrado.</td></tr>';
      return;
    }
    tbody.innerHTML = rows
      .map(
        (r) =>
          `<tr><td>${kbd(r.k, r.isCmd)}</td><td class="desc">${r.desc}</td><td>${badge(r.cat)}</td></tr>`,
      )
      .join('');
  }

  function buildTabs() {
    const all = ['Todos', ...Object.keys(cats)];
    document.getElementById('tabs').innerHTML = all
      .map(
        (c) =>
          `<button class="tab${c === activeCat ? ' active' : ''}" onclick="setTab('${c}')">${c}</button>`,
      )
      .join('');
  }

  function setTab(cat) {
    activeCat = cat;
    buildTabs();
    render();
  }

  buildTabs();
  render();
</script>
